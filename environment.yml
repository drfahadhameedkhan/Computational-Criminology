# Conda environment for the full book, including the spatial chapter.
# Create with:  conda env create -f environment.yml
# Activate with: conda activate compcrim
name: compcrim
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.26
  - pandas>=2.0
  - matplotlib>=3.7
  - scipy>=1.11
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - networkx>=3.0
  - requests>=2.31
  - geopandas>=0.14
  - libpysal>=4.9
  - esda>=2.5
  - shapely>=2.0
  - jupyterlab
  - pip
